org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Pin Gradle to JDK 17 (avoids Java 26 / AGP quirks). Must exist on disk — adjust or remove if your install differs.
# Discover: /usr/libexec/java_home -v 17
# Common paths:
#   macOS .pkg: /Library/Java/JavaVirtualMachines/openjdk-17.jdk/Contents/Home
#   Homebrew (Apple Silicon): /opt/homebrew/opt/openjdk@17/libexec/openjdk.jdk/Contents/Home
#   Homebrew (Intel): /usr/local/opt/openjdk@17/libexec/openjdk.jdk/Contents/Home
org.gradle.java.home=/opt/homebrew/opt/openjdk@17/libexec/openjdk.jdk/Contents/Home
