name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      # Errors and warnings fail the build; lint infos do not. Most infos are
      # `withOpacity` deprecations from Flutter SDK churn, and gating on them
      # meant any SDK bump turned CI red without the code changing.
      - run: flutter analyze --no-fatal-infos
      - run: flutter test
