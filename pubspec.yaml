name: fearless_inventory
description: Fearless Inventory — continuous stepwork, daily inventory, and twelve-step recovery tools. Private and encrypted on-device.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  hooks_riverpod: ^2.4.9
  flutter_hooks: ^0.20.4

  # Database (Drift + sqlite3 with SQLite3MultipleCiphers via build hook — replaces
  # sqlite3_flutter_libs / sqlcipher_flutter_libs for package:sqlite3 3.x)
  drift: ^2.14.1
  sqlite3: ^3.2.0
  path_provider: ^2.1.1
  path: ^1.8.3

  #IO
  pdf: ^3.10.0
  printing: ^5.11.0
  excel: ^4.0.0
  csv: ^6.0.0
  share_plus: ^7.1.0

  # Security: per-device database key storage
  flutter_secure_storage: ^9.0.0

  # Authentication — Firebase (optional cloud account)
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0

  # OAuth providers (App Store requires Sign in with Apple alongside Google)
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0

  # Biometric / device-credential unlock (Face ID, Touch ID, Fingerprint)
  local_auth: ^2.3.0

  # Cryptography — PIN salted-hash storage
  crypto: ^3.0.3

  # Icons & UI
  cupertino_icons: ^1.0.6
  intl: ^0.19.0
  table_calendar: ^3.1.2

  # Networking (Meeting Finder API)
  http: ^1.2.0

  # URL launching (Zoom deep links, maps)
  url_launcher: ^6.2.5

  # Device contacts — import to Rolodex
  # Local copy with iOS 13+ SceneDelegate nil-crash fix applied to
  # SwiftFlutterContactsPlugin.swift (register & contactViewControllerDidCancel).
  flutter_contacts:
    path: packages/flutter_contacts

  # Location (Nearby meetings)
  geolocator: ^12.0.0

  # Notifications
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  permission_handler: ^11.3.1

hooks:
  user_defines:
    sqlite3:
      source: sqlite3mc

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Code Generation Tools
  build_runner: ^2.4.8
  drift_dev: ^2.14.1

  # Linting
  flutter_lints: ^3.0.0

  # App launcher icons (Android mipmaps + iOS AppIcon.appiconset)
  flutter_launcher_icons: ^0.14.3

  # Mocking for unit / widget tests
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/branding/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/icon_light.png
  min_sdk_android: 21
  # iOS 18+ alternate appearances (dark home screen / tinted)
  image_path_ios_dark_transparent: assets/branding/icon_dark.png
  image_path_ios_tinted_grayscale: assets/branding/icon_tinted.png
  desaturate_tinted_to_grayscale_ios: true
  remove_alpha_ios: true
